services:
  db:
    image: postgres:${POSTGRES_VERSION:-18}-alpine
    container_name: urlshortener-db
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-url_shortener}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations/000001_create_links.up.sql:/docker-entrypoint-initdb.d/001_create_links.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-url_shortener}"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: urlshortener-app
    depends_on:
      db:
        condition: service_healthy
    environment:
      HTTP_ADDR: ${HTTP_ADDR:-:8080}
      BASE_URL: ${BASE_URL:-http://localhost:8080}
      STORAGE: ${STORAGE:-postgres}
      DB_HOST: ${DB_HOST:-db}
      DB_PORT: ${DB_PORT:-5432}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_NAME: ${DB_NAME:-url_shortener}
      DB_SSLMODE: ${DB_SSLMODE:-disable}
      SHUTDOWN_TIMEOUT: ${SHUTDOWN_TIMEOUT:-10s}
      CLEANUP_BATCH_SIZE: ${CLEANUP_BATCH_SIZE:-100}
      CLEANUP_RETENTION_YEARS: ${CLEANUP_RETENTION_YEARS:-3}
      CLEANUP_HOUR: ${CLEANUP_HOUR:-3}
      CLEANUP_MINUTE: ${CLEANUP_MINUTE:-0}
    ports:
      - "${APP_PORT:-8080}:8080"
    restart: unless-stopped

volumes:
  postgres_data:
